services:
  app:
    image: tvwatchlist-app:prod
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile.prod
    container_name: watchlist-app-prod
    restart: always
    environment:
      APP_ENV: prod
      OPCACHE_VALIDATE_TIMESTAMPS: 0
    env_file:
      - ./app/.env.local
    volumes:
      - app_public:/var/www/html/public
    networks:
      - app-network
    expose:
      - "9000"
    command: ["php-fpm", "-F"]

  nginx:
    container_name: tvwatchlist-nginx-prod
    image: nginx:stable-alpine
    restart: always
    ports:
      - '${APP_PORT_PROD:-10001}:80'
    volumes:
      - app_public:/var/www/html/public
      - ./docker/nginx/conf.d/default.prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  database:
    container_name: database
    build:
      context: .
      dockerfile: ./docker/mongodb/Dockerfile
    image: tvwatchlist-mongodb:local
    restart: always
    environment:
      MONGO_INITDB_DATABASE: api
      MONGO_INITDB_ROOT_USERNAME: api
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - db_data:/data/db:rw
      - ./backups:/backups:rw
    networks:
      - app-network
    ports:
      - "27017:27017"

volumes:
  db_data: {}
  app_public: {}

networks:
  app-network:
    driver: bridge
